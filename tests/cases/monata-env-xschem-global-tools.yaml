{
  "name": "monata-env-xschem-global-tools",
  "skill": "monata-env",
  "provider": "static",
  "workspace_fixture": "monata-basic",
  "prompt": "Use the monata-env skill to set up global Monata circuit tools including Xschem. CONDA_BUILD_OUTPUT_DIR=/tmp/monata-channel",
  "env": {
    "CONDA_BUILD_OUTPUT_DIR": "/tmp/monata-channel"
  },
  "fake_bins": {
    "pixi": {"stdout": "pixi 0.0.0-test"},
    "git": {"stdout": "git version 0.0.0-test"},
    "rattler-build": {"stdout": "rattler-build 0.0.0-test"}
  },
  "assertions": {
    "skill_must_contain": [
      "Xschem",
      "https://codeberg.org/stef_xschem/xschem/src/tag/3.4.7",
      "--package xschem",
      "--expose xschem=xschem",
      "xschem=3.4.7",
      "xschem --version"
    ]
  }
}
