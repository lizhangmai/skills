interface:
  display_name: "Monata Env"
  short_description: "Set up Monata circuit/layout tools"
  default_prompt: "Use $monata-env to set up global Monata circuit/layout tools: build or reuse required tool packages, install them into the pixi global monata-env environment, expose ngspice, openvaf-r, and klayout, and validate those tool commands. If I did not provide CONDA_BUILD_OUTPUT_DIR explicitly, ask me before running build, pixi, or install commands. Do not install Monata, the monata Python package, or techlibs."
