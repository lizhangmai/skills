# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

package:
  name: boost
  version: "1.88.0"

source:
  url: https://github.com/boostorg/boost/releases/download/boost-1.88.0/boost-1.88.0-b2-nodocs.tar.gz
  sha256: 85138e4a185a7e7535e82b011179c5b5fb72185bea9f59fe8e2d76939b2f5c51

requirements:
  build:
    - ${{ compiler('cxx') }}
    - make

build:
  number: 0
  script:
    content: |
      set -ex
      JOBS="${CPU_COUNT:-$(nproc)}"

      cd tools/build
      ./bootstrap.sh gcc
      cd ../..

      tools/build/b2 --with-filesystem --with-process --with-system \
        link=static runtime-link=shared threading=multi toolset=gcc \
        cxxflags="-fPIC" \
        -j"$JOBS"

      mkdir -p $PREFIX/include
      cp -rL boost $PREFIX/include/

      mkdir -p $PREFIX/lib
      cp stage/lib/*.a $PREFIX/lib/

about:
  homepage: https://www.boost.org/
  license: BSL-1.0
  license_file: LICENSE_1_0.txt
  summary: Separate Boost C++ dependency package for VACASK
