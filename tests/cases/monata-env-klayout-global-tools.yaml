{
  "name": "monata-env-klayout-global-tools",
  "skill": "monata-env",
  "provider": "static",
  "workspace_fixture": "monata-basic",
  "prompt": "Use the monata-env skill to set up global Monata circuit tools including KLayout. CONDA_BUILD_OUTPUT_DIR=/tmp/monata-channel",
  "env": {
    "CONDA_BUILD_OUTPUT_DIR": "/tmp/monata-channel"
  },
  "fake_bins": {
    "pixi": {"stdout": "pixi 0.0.0-test"},
    "git": {"stdout": "git version 0.0.0-test"},
    "rattler-build": {"stdout": "rattler-build 0.0.0-test"}
  },
  "assertions": {
    "skill_must_contain": [
      "KLayout",
      "https://github.com/KLayout/klayout/tree/v0.30.9",
      "--package klayout",
      "--expose klayout=klayout",
      "klayout=0.30.9",
      "smoke_monata_env_tools.py",
      "KLayout Ruby/RBA and Python"
    ]
  }
}
