interface:
  display_name: "Monata Env"
  short_description: "Set up Monata circuit/layout tools"
  default_prompt: "Use $monata-env to plan and set up global Monata circuit/layout tools: build or reuse required packages, install them into the pixi global monata-env environment, expose ngspice, openvaf-r, klayout, and xschem, then run and record the minimal tool smoke test in the install manifest. If local KLayout or Xschem source checkouts are provided, recommend the upstream-installed basic test profile before finalizing. If I did not provide CONDA_BUILD_OUTPUT_DIR explicitly, ask me before running build, pixi, or install commands. Do not install Monata, the monata Python package, or techlibs."
