interface:
  display_name: "Monata Sim Env"
  short_description: "Set up Monata simulation environments"
  default_prompt: "Use $monata-sim-env to create a pixi environment for Monata with ngspice verification. Build only the packages needed for the requested Monata workflow; for the current backend, use ngspice only. If I did not provide CONDA_BUILD_OUTPUT_DIR explicitly, ask me for it before running build, pixi, or install commands."
