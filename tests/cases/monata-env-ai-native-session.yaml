{
  "name": "monata-env-ai-native-session",
  "skill": "monata-env",
  "provider": "static",
  "workspace_fixture": "monata-basic",
  "prompt": "Use the monata-env skill as an AI-native setup session. CONDA_BUILD_OUTPUT_DIR=/tmp/monata-channel",
  "env": {
    "CONDA_BUILD_OUTPUT_DIR": "/tmp/monata-channel"
  },
  "fake_bins": {
    "pixi": {"stdout": "pixi 0.0.0-test"},
    "git": {"stdout": "git version 0.0.0-test"},
    "rattler-build": {"stdout": "rattler-build 0.0.0-test"}
  },
  "assertions": {
    "skill_must_contain": [
      "AI-native setup",
      "scripts/plan_monata_env.py",
      "--write-manifest",
      "plan.runbook",
      "record_after",
      "test_profiles",
      "questions",
      "scripts/smoke_monata_env_tools.py",
      "scripts/test_monata_env_upstream.py",
      "scripts/record_monata_env_session.py",
      "upstream-installed",
      "monata-env-install-manifest.json",
      "verification.smoke",
      "verification.upstream_installed",
      "recommended commands",
      "fallback"
    ],
    "installed_files": [
      "SKILL.md",
      "scripts/detect_monata_tools.py",
      "scripts/plan_monata_env.py",
      "scripts/record_monata_env_session.py",
      "scripts/smoke_monata_env_tools.py",
      "scripts/test_monata_env_upstream.py"
    ]
  }
}
