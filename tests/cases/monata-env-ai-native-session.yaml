{
  "name": "monata-env-ai-native-session",
  "skill": "monata-env",
  "provider": "static",
  "workspace_fixture": "monata-basic",
  "prompt": "Use the monata-env skill as an AI-native setup session. CONDA_BUILD_OUTPUT_DIR=/tmp/monata-channel",
  "env": {
    "CONDA_BUILD_OUTPUT_DIR": "/tmp/monata-channel"
  },
  "fake_bins": {
    "pixi": {"stdout": "pixi 0.0.0-test"},
    "git": {"stdout": "git version 0.0.0-test"},
    "rattler-build": {"stdout": "rattler-build 0.0.0-test"}
  },
  "assertions": {
    "skill_must_contain": [
      "AI-native setup",
      "scripts/plan_monata_env.py",
      "scripts/execute_monata_env_runbook.py",
      "--write-manifest",
      "plan.decisions",
      "plan.runbook",
      "plan.helper.conda_build_script",
      "depends_on",
      "stdout_path",
      "stderr_path",
      "next_actions",
      "record_after",
      "monata-env-build.out",
      "monata-env-smoke.err",
      "check_channel",
      "artifacts already present",
      "source policy",
      "test isolation",
      "test_profiles",
      "questions",
      "scripts/smoke_monata_env_tools.py",
      "scripts/test_monata_env_upstream.py",
      "scripts/record_monata_env_session.py",
      "upstream-installed",
      "--require-command",
      "missing-required-commands",
      "choose-container-with-required-commands",
      "use-local-container-image",
      "monata-env-install-manifest.json",
      "verification.smoke",
      "verification.upstream_installed",
      "recommended commands",
      "fallback"
    ],
    "installed_files": [
      "SKILL.md",
      "scripts/detect_monata_tools.py",
      "scripts/execute_monata_env_runbook.py",
      "scripts/plan_monata_env.py",
      "scripts/record_monata_env_session.py",
      "scripts/skill_container.py",
      "scripts/smoke_monata_env_tools.py",
      "scripts/test_monata_env_upstream.py"
    ]
  }
}
