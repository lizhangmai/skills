{
  "name": "monata-env-local-source-tools",
  "skill": "monata-env",
  "provider": "static",
  "workspace_fixture": "monata-basic",
  "prompt": "Use the monata-env skill with local KLayout and Xschem source checkouts at ../circuit/klayout and ../circuit/xschem. CONDA_BUILD_OUTPUT_DIR=/tmp/monata-channel",
  "env": {
    "CONDA_BUILD_OUTPUT_DIR": "/tmp/monata-channel"
  },
  "fake_bins": {
    "pixi": {"stdout": "pixi 0.0.0-test"},
    "git": {"stdout": "git version 0.0.0-test"},
    "rattler-build": {"stdout": "rattler-build 0.0.0-test"}
  },
  "assertions": {
    "skill_must_contain": [
      "local source",
      "source.path",
      "--local-source klayout=",
      "--local-source-ref klayout=v0.30.9",
      "--local-source xschem=",
      "--local-source-ref xschem=3.4.7",
      "plan.decisions",
      "upstream test",
      "../circuit/klayout",
      "../circuit/xschem"
    ]
  }
}
