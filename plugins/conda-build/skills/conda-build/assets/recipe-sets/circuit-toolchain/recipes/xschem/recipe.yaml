# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

package:
  name: xschem
  version: "3.4.7"

source:
  url: https://codeberg.org/stef_xschem/xschem/archive/92dd8fe5f4d5c1057489710d8a22f18fdc9d7ed0.tar.gz
  sha256: 2d292390a9144082a79b862c2ef39bc67164868f466ad5dfbc9367f498fede16

requirements:
  build:
    - ${{ compiler('c') }}
    - bison
    - flex
    - gawk
    - libx11-devel-conda-x86_64
    - libxcb-devel-conda-x86_64
    - libxrender-devel-conda-x86_64
    - make
    - pkg-config
    - patchelf
    - xorg-xorgproto
  host:
    - cairo
    - expat
    - freetype
    - libjpeg-turbo
    - libxcb
    - tk
    - xorg-libx11
    - xorg-libxpm
    - xorg-libxrender
    - xorg-xorgproto
    - zlib
  run:
    - cairo
    - libjpeg-turbo
    - libxcb
    - tk
    - xorg-libx11
    - xorg-libxpm
    - xorg-libxrender

build:
  number: 0
  script:
    content: |
      export PKG_CONFIG_PATH="$PREFIX/lib/pkgconfig:$PREFIX/share/pkgconfig:${PKG_CONFIG_PATH:-}"
      export CFLAGS="${CFLAGS:-} -I$PREFIX/include -I$BUILD_PREFIX/include"
      export CPPFLAGS="${CPPFLAGS:-} -I$PREFIX/include -I$BUILD_PREFIX/include"
      export LDFLAGS="${LDFLAGS:-} -L$PREFIX/lib"
      JOBS="${CPU_COUNT:-$(nproc)}"
      ./configure \
        --prefix="$PREFIX" \
        --pkg-config=pkg-config \
        --CFLAGS="$CFLAGS" \
        --LDFLAGS="$LDFLAGS"
      make -j"$JOBS"
      make install
      test -x "$PREFIX/bin/xschem"

about:
  homepage: https://codeberg.org/stef_xschem/xschem
  license: GPL-2.0-or-later
  license_file: LICENSE
  summary: Xschem schematic editor and netlisting tool for VLSI, ASIC, and analog designs
