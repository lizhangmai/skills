{
  "name": "monata-env-global-tools",
  "skill": "monata-env",
  "provider": "static",
  "workspace_fixture": "monata-basic",
  "prompt": "Use the monata-env skill to set up global Monata circuit tools. CONDA_BUILD_OUTPUT_DIR=/tmp/monata-channel",
  "env": {
    "CONDA_BUILD_OUTPUT_DIR": "/tmp/monata-channel"
  },
  "fake_bins": {
    "pixi": {"stdout": "pixi 0.0.0-test"},
    "git": {"stdout": "git version 0.0.0-test"},
    "rattler-build": {"stdout": "rattler-build 0.0.0-test"}
  },
  "assertions": {
    "skill_must_contain": [
      "pixi global install --environment monata-env",
      "--channel \"file://$CONDA_BUILD_OUTPUT_DIR\"",
      "--channel https://prefix.dev/conda-forge",
      "--expose ngspice=ngspice",
      "--expose openvaf-r=openvaf-r",
      "--expose klayout=klayout",
      "--expose xschem=xschem",
      "klayout=0.30.9",
      "xschem=3.4.7",
      "execute_monata_env_runbook.py",
      "plan_monata_env.py",
      "conda_build_script",
      "runbook",
      "depends_on",
      "stdout_path",
      "stderr_path",
      "record_after",
      "monata-env-build.out",
      "monata-env-build.err",
      "artifacts already present",
      "record_monata_env_session.py",
      "smoke_monata_env_tools.py",
      "verification.smoke",
      "monata-env-install-manifest.json"
    ],
    "installed_files": [
      "SKILL.md",
      "scripts/detect_monata_tools.py",
      "scripts/execute_monata_env_runbook.py",
      "scripts/plan_monata_env.py",
      "scripts/record_monata_env_session.py",
      "scripts/smoke_monata_env_tools.py",
      "scripts/test_monata_env_upstream.py"
    ]
  }
}
